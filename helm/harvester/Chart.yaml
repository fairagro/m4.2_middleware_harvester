apiVersion: v2
name: fairagro-advanced-middleware-harvester-chart
description: >
  FAIRagro Middleware Harvester — runs the metadata harvesting pipeline as a
  Kubernetes CronJob. Supports INSPIRE/CSW and Schema.org sources.
type: application
# Chart version — bump on every chart change.
version: 0.1.0
# Application version — placeholder for local development only (helm lint, helm template).
# In CI, helm package --app-version <version> overrides this value inside the
# produced .tgz without modifying this file. The version is auto-detected from
# the latest *-docker-v* Git tag by the helm-release / helm-pre-release workflow.
appVersion: "1.0.0"
keywords:
  - fairagro
  - harvester
  - middleware
  - inspire
  - csw
  - schema-org
home: https://github.com/fairagro/m4.2_middleware_harvester
sources:
  - https://github.com/fairagro/m4.2_middleware_harvester
maintainers:
  - name: FAIRagro Middleware Team
    url: https://fairagro.net
# Requires Kubernetes 1.27+ (CronJob batch/v1 stable since 1.21; 1.27 for
# CronJob timeZone field GA).
kubeVersion: ">=1.27.0-0"
