{{- if .Values.tls.enabled }}
{{- required "tls.clientCert is required when tls.enabled is true" .Values.tls.clientCert }}
{{- required "tls.clientKey is required when tls.enabled is true" .Values.tls.clientKey }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "harvester.tlsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harvester.labels" . | nindent 4 }}
stringData:
  client.crt: {{ .Values.tls.clientCert | quote }}
  client.key: {{ .Values.tls.clientKey | quote }}
  {{- if .Values.tls.caCert }}
  ca.crt: {{ .Values.tls.caCert | quote }}
  {{- end }}
{{- end }}
