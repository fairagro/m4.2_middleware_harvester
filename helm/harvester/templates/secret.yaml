{{- if .Values.tls.enabled }}
{{- required "tls.clientCert is required when tls.enabled is true" .Values.tls.clientCert }}
{{- required "tls.clientKey is required when tls.enabled is true" .Values.tls.clientKey }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "harvester.tlsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "harvester.labels" . | nindent 4 }}
stringData:
{{- if .Values.tls.clientCert }}
  client.crt: |
{{ .Values.tls.clientCert | indent 4 }}
{{- end }}
{{- if .Values.tls.clientKey }}
  client.key: |
{{ .Values.tls.clientKey | indent 4 }}
{{- end }}
{{- if .Values.tls.caCert }}
  ca.crt: |
{{ .Values.tls.caCert | indent 4 }}
{{- end }}
{{- end }}
