services:
  middleware-api:
    image: python:3.12-slim
    container_name: middleware-api-demo
    environment:
      - LOCAL_UID=${LOCAL_UID:-1000}
      - LOCAL_GID=${LOCAL_GID:-1000}
    ports:
      - "8000:8000"
    volumes:
      - ./demo_output:/data/arcs
      - ./demo_api_main.py:/app/main.py:ro
    command:
      - /bin/sh
      - -c
      - |
        set -e
        pip install --quiet fastapi uvicorn arctrl
        uvicorn main:app --app-dir /app --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/live')\" 2>/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  harvester:
    image: harvester:demo
    build:
      context: ..
      dockerfile: docker/Dockerfile.harvester
    depends_on:
      middleware-api:
        condition: service_healthy
    volumes:
      - ./config.demo.yaml:/etc/inspire/config.yaml:ro
    command: /middleware/harvester/harvester -c /etc/inspire/config.yaml
