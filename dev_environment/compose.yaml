services:
  harvester:
    image: harvester:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.harvester
    environment:
      CLIENT_KEY_DATA: ${data}
    tmpfs:
      - /run/secrets:mode=1777
    volumes:
      - ./config.yaml:/etc/harvester/config.yaml:ro
      - ./client.crt:/etc/harvester/client.crt:ro
    command: >
      sh -c "printf '%s' \"$$CLIENT_KEY_DATA\" > /run/secrets/client.key &&
            /middleware/harvester/harvester -c /etc/harvester/config.yaml"
    restart: no
