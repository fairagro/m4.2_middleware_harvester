services:
  inspire:
    image: inspire:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.inspire
    environment:
      CLIENT_KEY_DATA: ${data}
    tmpfs:
      - /run/secrets:mode=1777
    volumes:
      - ./config.yaml:/etc/inspire/config.yaml:ro
      - ./client.crt:/etc/inspire/client.crt:ro
    command: >
      sh -c "printf '%s' \"$$CLIENT_KEY_DATA\" > /run/secrets/client.key &&
            /middleware/inspire/inspire -c /etc/inspire/config.yaml"
    restart: no
