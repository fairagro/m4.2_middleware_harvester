name: Reusable Code Quality

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      components:
        description: 'A JSON string array of components to check'
        required: false
        type: string
        default: '["inspire_to_arc"]'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --all-packages

      - name: Code formatting and linting
        run: |
          uv run ruff format --check --diff middleware/
          uv run ruff check middleware/
          uv run pylint middleware/ --fail-under=8.0 --output-format=colorized
          uv run mypy middleware/ --ignore-missing-imports --strict-optional

      - name: Security check with bandit
        run: uv run bandit -r middleware/ --exclude middleware/tests/ --skip B101 -ll

      - name: Run tests
        run: uv run pytest middleware/inspire_to_arc/tests/ -v --junitxml=pytest-report.xml
