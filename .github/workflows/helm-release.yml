name: Helm Chart Release

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type for Helm chart release'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_USER_NAME: ${{ vars.GIT_USER_NAME || 'GitHub Pipeline' }}
  GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL || 'github_pipeline@fairagro.net' }}
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || 'zalf' }}
  CHART_DIR: helm/harvester
  CHART_NAME: fairagro-advanced-middleware-harvester-chart

jobs:
  validate-branch:
    name: Validate Main Branch
    runs-on: ubuntu-latest
    steps:
      - name: Assert main branch
        run: |
          if [[ "${{ github.ref_name }}" != "main" ]]; then
            echo "::error::The Helm Chart Release workflow can only be triggered from the 'main' branch."
            exit 1
          fi

  version:
    name: Determine Version
    needs: validate-branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.calc-version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next chart version
        id: calc-version
        run: |
          # Find latest final release tag (timestamp-prefixed, e.g. 20260421143022-chart-v1.2.3)
          LATEST_CHART_VERSION=$(git tag --list '*-chart-v*' \
            | grep -E '^[0-9]+-chart-v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's/^[0-9]*-chart-v//' \
            | sort -V \
            | tail -1)
          if [ -z "$LATEST_CHART_VERSION" ]; then LATEST_CHART_VERSION="0.0.0"; fi

          MAJOR=$(echo "$LATEST_CHART_VERSION" | cut -d. -f1)
          MINOR=$(echo "$LATEST_CHART_VERSION" | cut -d. -f2)
          PATCH=$(echo "$LATEST_CHART_VERSION" | cut -d. -f3)

          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            *)     PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Report version to summary
        run: |
          echo "## 📦 Helm Chart Release Version" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Chart Version** | \`${{ steps.calc-version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  helm-release:
    name: Release
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    env:
      CHART_VERSION: ${{ needs.version.outputs.version }}
      DOCKERHUB_AVAILABLE: ${{ secrets.DOCKERHUB_USER != '' && secrets.DOCKERHUB_TOKEN != '' }}

    steps:
      - name: Generate timestamp
        id: timestamp
        run: echo "value=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v5
        with:
          version: '3.14.0'

      - name: Detect current Docker release version
        id: docker-version
        run: |
          LATEST=$(git tag --list '*-docker-v*' \
            | grep -E '^[0-9]+-docker-v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's/^[0-9]*-docker-v//' \
            | sort -V \
            | tail -1)
          if [ -z "$LATEST" ]; then
            echo "::error::No docker release tag found. Publish a Docker image first."
            exit 1
          fi
          echo "value=${LATEST}" >> $GITHUB_OUTPUT
          echo "🐳 App version: ${LATEST}"

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ env.CHART_VERSION }}/" ${{ env.CHART_DIR }}/Chart.yaml
          echo "📝 Chart.yaml version set to ${{ env.CHART_VERSION }}"

      - name: Package Helm chart
        id: package_chart
        run: |
          helm package ./${{ env.CHART_DIR }} --version "${{ env.CHART_VERSION }}" --app-version "${{ steps.docker-version.outputs.value }}"
          CHART_PACKAGE=$(ls *.tgz | head -1)
          echo "chart-package=$CHART_PACKAGE" >> $GITHUB_OUTPUT
          echo "📦 Created Helm chart package: $CHART_PACKAGE"

      - name: Create version tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.timestamp.outputs.value }}-chart-v${{ env.CHART_VERSION }}
          tag_prefix: ""
          create_annotated_tag: true

      - name: Create GitHub Release (Draft)
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.timestamp.outputs.value }}-chart-v${{ env.CHART_VERSION }}
          name: chart-v${{ env.CHART_VERSION }}
          body: |
            ## Helm Chart Release v${{ env.CHART_VERSION }}

            **Chart Version**: `${{ env.CHART_VERSION }}`

            ### Install via OCI registry (Docker Hub)
            ```bash
            helm upgrade --install fairagro-harvester \
              oci://registry-1.docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.CHART_NAME }} \
              --version ${{ env.CHART_VERSION }}
            ```

            ### Install via OCI registry (GHCR)
            ```bash
            helm upgrade --install fairagro-harvester \
              oci://ghcr.io/${{ github.repository_owner }}/${{ env.CHART_NAME }} \
              --version ${{ env.CHART_VERSION }}
            ```

            ### Fallback (install from attached file)
            Download the `.tgz` attached to this release, then:
            ```bash
            helm upgrade --install fairagro-harvester \
              ${{ env.CHART_NAME }}-${{ env.CHART_VERSION }}.tgz
            ```

            *(The `appVersion` and container image tag are defined in the chart's `values.yaml`.)*
          files: ${{ steps.package_chart.outputs.chart-package }}
          draft: true
          prerelease: false
          generate_release_notes: true
          make_latest: true

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Finalizing helm release for tag: ${{ steps.timestamp.outputs.value }}-chart-v${{ env.CHART_VERSION }}"
          sleep 5

          if RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/${{ steps.timestamp.outputs.value }}-chart-v${{ env.CHART_VERSION }} --jq '.id' 2>/dev/null); then
            echo "✅ Found release ID via tag: $RELEASE_ID"
          else
            echo "⚠️ Release not found via tag, searching in all releases..."
            RELEASE_ID=$(gh api repos/${{ github.repository }}/releases --jq '.[] | select(.tag_name == "${{ steps.timestamp.outputs.value }}-chart-v${{ env.CHART_VERSION }}") | .id')
            if [[ -n "$RELEASE_ID" ]]; then
              echo "✅ Found release ID via search: $RELEASE_ID"
            else
              echo "❌ Release not found!"
              exit 1
            fi
          fi

          gh api repos/${{ github.repository }}/releases/$RELEASE_ID \
            --method PATCH \
            --field draft=false
          echo "🎉 Helm release finalized successfully"

      - name: Push Helm chart to Docker Hub
        if: env.DOCKERHUB_AVAILABLE == 'true'
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login \
            -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin registry-1.docker.io
          helm push "${{ steps.package_chart.outputs.chart-package }}" \
            oci://registry-1.docker.io/${{ env.DOCKERHUB_NAMESPACE }}
          echo "✅ Pushed Helm chart to Docker Hub: ${{ env.DOCKERHUB_NAMESPACE }}/${{ steps.package_chart.outputs.chart-package }}"

      - name: Push Helm chart to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login \
            -u "${{ github.actor }}" --password-stdin ghcr.io
          helm push "${{ steps.package_chart.outputs.chart-package }}" \
            oci://ghcr.io/${{ github.repository_owner }}
          echo "✅ Pushed Helm chart to GHCR: ghcr.io/${{ github.repository_owner }}/${{ steps.package_chart.outputs.chart-package }}"
