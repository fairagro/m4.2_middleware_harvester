name: Release

permissions:
  contents: write
  packages: write
  security-events: write

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
        - major
        - minor
        - patch
  workflow_call:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: string

jobs:
  code-quality:
    name: Code Quality
    uses: ./.github/workflows/reusable-code-quality.yml
    with:
      components: '["inspire_to_arc"]'
    secrets: inherit

  build:
    name: Build
    uses: ./.github/workflows/reusable-build.yml
    with:
      version_bump: ${{ inputs.version_bump }}
      components: '["inspire_to_arc"]'
    secrets: inherit

  check:
    name: Check
    needs: build
    uses: ./.github/workflows/reusable-check.yml
    with:
      version: ${{ needs.build.outputs.version }}
      components: '["inspire_to_arc"]'
    secrets: inherit

  release:
    name: Release
    needs: [build, check, code-quality]
    uses: ./.github/workflows/reusable-release.yml
    with:
      version: ${{ needs.build.outputs.version }}
      components: '["inspire_to_arc"]'
      release_type: 'final'
    secrets: inherit
